name: Release radio (radio_module)

# radio-basecamp is a two-module repo (radio_module + radio_ui); module_path points into the subdir.
# linux-amd64 only — hosting needs MediaMTX + Tor host + the C++/Qt build env (see radio issue #18 for a
# listen-only macOS/arm flavor). Restriction mirrors zone-sequencer.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    uses: logos-co/logos-modules-release-action/.github/workflows/release.yml@v1
    with:
      module_path: submodules/radio-basecamp/radio_module
      variants: linux-amd64
      signing_mode: none
    secrets: inherit
