name: Release radio (radio_module)

# Manually-triggered release for the radio core module. radio-basecamp is a
# two-module repo (radio_module + radio_ui), so module_path points into the
# subdir that holds the flake + metadata.json. See release-radio-ui.yml for the UI.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/_release-module.yml
    with:
      module_path: submodules/radio-basecamp/radio_module
    secrets: inherit
